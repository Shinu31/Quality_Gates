
name: quality gates
on:
  push:
    branches:
      -main

jobs:      
   CI-job:
      runs-on: ubuntu-latest
      steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run test and inforce coverage
        run: pytest --cov=cal --cov-report-term --cov-fail-under=80  
           
   CD-job:
      runs-on: ubuntu-latest
      needs: CI-job
      steps:
      - name: checkout code
        uses: actions/checkout@v2
        
      - name: print message
        run: echo "deployment successful"


